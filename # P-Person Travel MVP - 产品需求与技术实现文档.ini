# P-Person Travel MVP - 产品需求与技术实现文档

## 1. 项目定位与全局架构
* **产品目标**：为不习惯提前规划的即兴旅行者提供基于当前位置的实时餐饮推荐与即时路线。
* **整体布局**：采用“左右分屏”设计。左半屏为互动地图区域，右半屏为 AI 对话与信息展示区域。
* **语言规范**：UI 界面采用全英文，Agent 对话交流和内容输出使用中文。

## 2. 技术栈锁定 (强制要求)
* **前端框架**：Next.js (App Router) + React + Tailwind CSS + TypeScript。
* **地图服务**：Google Maps JavaScript API。
* **位置与路线数据**：Google Places API (New) + Google Routes API。
* **AI 中枢**：采用 OpenAI SDK，但必须将 `baseURL` 配置为 `https://api.siliconflow.cn/v1`（硅基流动），模型默认使用 `deepseek-chat`（或其他指定大模型）。

## 3. 核心功能流转 (User Flow)

### 3.1 获取定位与区域限制
1. 用户进入页面，触发浏览器原生 `Geolocation API` 获取经纬度。
2. **地理围栏限制**：MVP 仅开放【泰国】和【日本】。若解析到的位置不在此区域内，右侧对话框提示：“此区域暂不提供服务”。
3. **手动校正定位**：支持在右侧对话框输入文本（如“我在新宿”或“曼谷 Terminal 21”）来校正位置。调用 Google Geocoding API 转为经纬度并更新全局状态。**禁止使用截图反推定位**。
4. **地点消歧义**：当手动输入文本返回多个相距较远（>2km）的同名地点时，Agent 需停止推荐，在对话框渲染出可点击的选项按钮（如 `[Terminal 21 Asok]`、`[Terminal 21 Rama 3]`），用户点击后更新精确位置，再继续走推荐逻辑。

### 3.2 智能对话与意图解析
1. **Agent 设定**：语气亲切自然。当用户询问能力范围时，能主动用中文做简短的自我介绍。
2. **条件解析**：接收用户自然语言输入后，Agent 必须输出结构化 JSON 给前端查询，严格遵守以下转换逻辑：
   * **距离限制**：将时间描述（如半小时内）或默认距离转换为直线搜索半径 `radius`，最大不超过 10km。
   * **价格转换**：理解当地货币，映射为 API 的 `priceLevels` 参数。
   * **评分底线**：默认过滤 `rating` < 3.0 的地点。
   * **氛围词汇处理**：Agent 需自行提炼查询 Keywords。**严禁大模型自己编造不存在的餐厅名**，所有数据必须基于 API 的真实返回。

### 3.3 数据展示与左右屏联动 (核心 UX)
#### A. 列表展示状态（初始推荐）
* 右侧对话框返回推荐结果时，展示紧凑型卡片列表。
* **卡片字段**：仅展示首图 (`photos[0]`)、店名、评分与评价数、价格档位 (`priceLevel`)、营业状态 (`openNow`)，以及 Agent 提炼的【15字中文推荐理由】。
* **地图联动**：左侧地图打上对应 Marker。Hover 右侧卡片时，左侧对应 Marker 需高亮/放大。

#### B. 详情与路线展示状态（右侧抽屉面板）
* 用户点击某张推荐卡片后，右侧列表被“详情抽屉 (Slide-over Drawer)”覆盖，顶部保留显眼的“返回 (< Back)”按钮。
* **抽屉展示内容**：多张环境照/菜品照、详细地址、营业时间、精选最新 2 条评论 (`reviews`)、Google 官方编辑总结 (`editorialSummary`)。
* **左侧路线渲染**：抽屉弹出的瞬间，前端调用 **Google Routes API**。左侧地图清除无关 Marker，绘制当前位置到该店的导航路径 (Polyline)，并在地图醒目位置浮现“交通方式 + 预计时长 + 距离”信息。

## 4. 状态处理与边缘场景 (State & Edge Cases)

### 4.1 加载与分页 (Loading & Pagination)
* **获取定位 Loading**：若超时或被拒绝，默认回退至曼谷市中心 (13.736717, 100.561119)，提示用户手动输入。
* **AI 请求 Loading**：右侧聊天框需展示消息级骨架屏 (Skeleton) 和加载动效。
* **换一批 (Load More)**：若 API 返回 `nextPageToken`，在当前结果列表下方展示“换一批”按钮。点击后不重新生成对话，直接请求下一页并追加卡片，左侧 Marker 同步刷新。

### 4.2 空状态与异常处理
* **条件过严 (Zero Results)**：API 返回空时，LLM 转化为自然语言回复（如“附近没找到，稍微放宽点条件吧”），不渲染卡片。
* **打烊预警 (Closing Soon)**：对比当前时间与 `closeTime`，若距离打烊不足 1 小时，卡片必须以醒目红色标出“即将打烊”。
* **图片缺失降级**：API 未返回 `photos` 时，必须使用本地 Fallback Image 占位。
* **API 按需请求**：调用 Places API (New) 时必须严格使用 FieldMask 仅请求需要的字段，禁止全量请求。